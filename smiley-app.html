<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Smiley Spaß</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    overflow: hidden;
    color: #fff;
  }

  header {
    text-align: center;
    padding: 24px 0 8px;
  }

  header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  header p {
    font-size: 0.9rem;
    opacity: 0.6;
    margin-top: 4px;
  }

  /* Bühne für die Smileys */
  .stage {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 180px;
  }

  .smiley {
    position: absolute;
    font-size: 8rem;
    opacity: 0;
    pointer-events: none;
  }

  .smiley.show {
    animation: pop 1.6s ease forwards;
  }

  @keyframes pop {
    0%   { opacity: 0; transform: scale(0.2) rotate(-25deg); }
    25%  { opacity: 1; transform: scale(1.15) rotate(8deg); }
    45%  { transform: scale(1) rotate(-4deg); }
    70%  { opacity: 1; transform: scale(1) rotate(0deg); }
    100% { opacity: 0; transform: scale(0.6) translateY(-40px); }
  }

  /* Buttons */
  .buttons {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
    width: 100%;
    max-width: 420px;
    padding-bottom: 24px;
  }

  .btn {
    border: none;
    border-radius: 20px;
    padding: 22px 0;
    font-size: 2.2rem;
    cursor: pointer;
    color: #fff;
    box-shadow: 0 6px 16px rgba(0, 0, 0, 0.35);
    transition: transform 0.1s ease, box-shadow 0.1s ease;
  }

  .btn:active {
    transform: scale(0.92);
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.35);
  }

  /* Der 5. Button spannt über zwei Spalten mittig */
  .btn:nth-child(4) { grid-column: 1 / 2; }
  .btn:nth-child(5) { grid-column: 2 / 4; }

  .btn1 { background: linear-gradient(135deg, #ff6b6b, #ee5253); }
  .btn2 { background: linear-gradient(135deg, #feca57, #ff9f43); }
  .btn3 { background: linear-gradient(135deg, #1dd1a1, #10ac84); }
  .btn4 { background: linear-gradient(135deg, #54a0ff, #2e86de); }
  .btn5 { background: linear-gradient(135deg, #a55eea, #8854d0); }
</style>
</head>
<body>

  <header>
    <h1>😜 Smiley Spaß</h1>
    <p>Tippe einen Button an!</p>
  </header>

  <div class="stage" id="stage"></div>

  <div class="buttons">
    <button class="btn btn1" data-smiley="🤪">🤪</button>
    <button class="btn btn2" data-smiley="😂">😂</button>
    <button class="btn btn3" data-smiley="🥳">🥳</button>
    <button class="btn btn4" data-smiley="😎">😎</button>
    <button class="btn btn5" data-smiley="🤩">🤩</button>
  </div>

  <script>
    const stage = document.getElementById("stage");
    const buttons = document.querySelectorAll(".btn");

    buttons.forEach(function (btn) {
      btn.addEventListener("click", function () {
        const emoji = btn.getAttribute("data-smiley");
        showSmiley(emoji);
      });
    });

    function showSmiley(emoji) {
      // Bühne leeren, damit immer nur ein Smiley zu sehen ist
      stage.innerHTML = "";

      const el = document.createElement("div");
      el.className = "smiley";
      el.textContent = emoji;
      stage.appendChild(el);

      // Animation starten
      requestAnimationFrame(function () {
        el.classList.add("show");
      });

      // Nach der Animation wieder entfernen
      el.addEventListener("animationend", function () {
        el.remove();
      });
    }
  </script>

</body>
</html>
