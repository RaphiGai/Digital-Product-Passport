applications:
  - name: dpp-frontend-approuter
    path: .
    memory: 256M
    disk_quota: 512M
    buildpacks:
      - nodejs_buildpack
    services:
      - dpp-uaa
    env:
      # Inline destination to the backend CAP service. forwardAuthToken sends the XSUAA
      # JWT to dpp-srv, which accepts it because we bind the SAME dpp-uaa instance.
      destinations: '[{"name":"srv-api","url":"https://cf-procode-bas-dev-dpp-srv.cfapps.eu10-004.hana.ondemand.com","forwardAuthToken":true}]'
