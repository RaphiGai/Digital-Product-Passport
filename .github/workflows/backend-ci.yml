name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'dpp_backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dpp_backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  cap-build-test:
    name: CAP backend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dpp_backend
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dpp_backend/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Build CDS
        run: npx cds build --production

      - name: Run tests
        run: npm test
        env:
          QR_TOKEN_HMAC_SECRET: 'ci-test-secret-not-for-production-use'
