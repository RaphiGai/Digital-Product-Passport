name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'dpp_frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dpp_frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  ui-build:
    name: React UI lint & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dpp_frontend/app
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: dpp_frontend/app/package-lock.json

      - name: Install dependencies
        run: npm ci || npm install

      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build
